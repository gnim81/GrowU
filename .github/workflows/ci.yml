name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: growu
          POSTGRES_PASSWORD: growu_test_password
          POSTGRES_DB: growu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://growu:growu_test_password@localhost:5432/growu_test?schema=public
      AUTH_SECRET: 12345678901234567890123456789012
      AUTH_COOKIE_SECURE: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
